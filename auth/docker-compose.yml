version: '3.8'

services:
  auth-server:
    build: .
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/auth_db}
      - REDIS_URI=${REDIS_URI:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - auth-network

  mongodb:
    image: mongo:7
    container_name: auth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=auth_db
    networks:
      - auth-network

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auth-network

volumes:
  mongodb_data:
  redis_data:

networks:
  auth-network:
    driver: bridge
